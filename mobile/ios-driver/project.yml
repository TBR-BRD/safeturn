name: SafeTurnDriver
options:
  bundleIdPrefix: de.safeturn
  deploymentTarget:
    iOS: '16.0'
settings:
  base:
    SWIFT_VERSION: 5.0
targets:
  SafeTurnDriver:
    type: application
    platform: iOS
    sources:
      - SafeTurnDriver
    info:
      path: SafeTurnDriver/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.safeturn.driver
        INFOPLIST_FILE: SafeTurnDriver/Info.plist
    entitlements:
      path: SafeTurnDriver/SafeTurnDriver.entitlements
