name: Firmware Check

on:
  push:
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware-check.yml'
  pull_request:
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware-check.yml'

jobs:
  platformio-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build ESP32 gateway
        run: |
          cd firmware/esp32-gateway
          pio run
